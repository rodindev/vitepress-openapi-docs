openapi: 3.1.0
info:
  title: AllOf
  version: 1.0.0
paths:
  /pets:
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/NewPet'
                - type: object
                  properties:
                    id:
                      type: integer
                  required:
                    - id
      responses:
        '201':
          description: created
components:
  schemas:
    NewPet:
      type: object
      properties:
        name:
          type: string
        tag:
          type: string
      required:
        - name
    Pet:
      allOf:
        - $ref: '#/components/schemas/NewPet'
        - type: object
          properties:
            id:
              type: integer
          required:
            - id
