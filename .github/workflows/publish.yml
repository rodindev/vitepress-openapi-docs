name: Publish
on:
  push:
    tags:
      - 'v*'
jobs:
  # Gate on CI — wait for the push-triggered CI run on main to finish.
  # This prevents publishing a broken version if CI catches an issue.
  wait-for-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CI to pass on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Waiting for CI workflow to complete on $SHA..."
          for i in $(seq 1 60); do
            STATUS=$(gh run list --workflow ci.yml --commit "$SHA" --json conclusion,status -q '.[0]')
            CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion // empty')
            STATE=$(echo "$STATUS" | jq -r '.status // empty')
            if [ "$CONCLUSION" = "success" ]; then
              echo "CI passed."
              exit 0
            elif [ "$CONCLUSION" = "failure" ]; then
              echo "::error::CI failed on $SHA — aborting publish."
              exit 1
            fi
            echo "CI status: $STATE (attempt $i/60), waiting 10s..."
            sleep 10
          done
          echo "::error::Timed out waiting for CI after 10 minutes."
          exit 1

  validate:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CORE=$(node -p "require('./packages/core/package.json').version")
          CREATE=$(node -p "require('./packages/create/package.json').version")
          if [ "$CORE" != "$TAG" ] || [ "$CREATE" != "$TAG" ]; then
            echo "::error::Version mismatch: tag=$TAG core=$CORE create=$CREATE"
            exit 1
          fi
      - run: npm run typecheck
      - run: npm run lint:check
      - run: npm run format:check
      - run: npm run test:run
      - run: npm run build
      - run: npm run --workspace packages/core size

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npm run --workspace packages/core build
      - run: npm run --workspace packages/create build
      - name: Publish vitepress-openapi-docs
        run: npm publish --workspace packages/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish create-vitepress-openapi-docs
        run: npm publish --workspace packages/create --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## ${TAG//./\\.}\$/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Write to file to avoid escaping issues
          echo "$BODY" > /tmp/release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --notes-file /tmp/release-notes.md
