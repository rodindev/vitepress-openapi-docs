version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Dev-server-only deps — vulnerabilities don't affect published packages.
      # Unblock when patched versions are available.
      - dependency-name: vite
        update-types: ['version-update:semver-patch']
      - dependency-name: esbuild
        update-types: ['version-update:semver-patch']
